# 易经 MVP — IP 内测 Nginx 配置
#
# 安装位置（示例）：
#   sudo cp deploy/nginx/yijing-ip.conf /etc/nginx/conf.d/yijing.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# 访问：http://SERVER_IP/
# API： http://SERVER_IP/api/v1/...
#
# -------------------------------------------------------------------
# 后续切换域名 + HTTPS（备案完成后）：
# 1. 将 server_name 改为 www.xxx.com（及 api.xxx.com 若拆分子域）
# 2. 增加 listen 443 ssl 与证书路径
# 3. 增加 listen 80 的 return 301 https://$host$request_uri;
# 4. 更新 .env 中 CORS_ALLOWED_ORIGINS、NEXT_PUBLIC_* 为 https 域名
# 5. 重新 docker compose build frontend（NEXT_PUBLIC_* 在 build 时写入）
# 6. 若 API 独立子域 api.xxx.com，可单独 server 块反代 backend，无需 /api 路径
# -------------------------------------------------------------------

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 10m;

    # 后端 API（Go 路由前缀 /api/v1）
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 后端健康检查（可选，便于监控）
    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Next.js 前端
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
